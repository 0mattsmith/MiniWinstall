name: Cross-platform release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    outputs:
      artifact-paths: ${{ steps.set-output.outputs.artifacts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install system dependencies (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y wimtools zip
          else
            brew update
            brew install wimlib zip
          fi

      - name: (Optional) Install wimlib on Windows
        if: runner.os == 'Windows'
        run: |
          echo "If you need wimlib on Windows, add a step here to download wimlib-imagex.exe and place it on PATH."

      - name: Build (cargo release)
        run: |
          cargo build --release

      - name: Package output
        id: package
        run: |
          set -e
          mkdir -p dist
          case "${{ matrix.os }}" in
            "ubuntu-latest")
              BIN=mini-winstall-engine
              TARBALL=mini-winstall-linux-x86_64-${{ github.ref_name || github.sha }}.tar.gz
              cp target/release/$BIN dist/ || true
              tar -czf dist/$TARBALL -C dist $BIN
              echo "artifacts=dist/$TARBALL" >> $GITHUB_OUTPUT
              ;;
            "macos-latest")
              BIN=mini-winstall-engine
              TARBALL=mini-winstall-macos-${{ github.ref_name || github.sha }}.tar.gz
              cp target/release/$BIN dist/ || true
              tar -czf dist/$TARBALL -C dist $BIN
              echo "artifacts=dist/$TARBALL" >> $GITHUB_OUTPUT
              ;;
            "windows-latest")
              BIN=mini-winstall-engine.exe
              ZIP=mini-winstall-windows-${{ github.ref_name || github.sha }}.zip
              powershell -Command "Compress-Archive -Path target\\release\\$BIN -DestinationPath dist\\$ZIP"
              echo "artifacts=dist/$ZIP" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*

  create_release:
    name: Create Release and attach assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List files (for debug)
        run: ls -la dist || true

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: "dist/*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
