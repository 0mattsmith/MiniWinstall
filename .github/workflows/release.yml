name: Cross-Platform Rust Engine Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Engine Installer Binary - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: mini-winstall-engine.exe
            release_name: mini-winstall-engine-windows-amd64.exe
          - name: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            bin_name: mini-winstall-engine
            release_name: mini-winstall-engine-macos-intel
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bin_name: mini-winstall-engine
            release_name: mini-winstall-engine-macos-arm64
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin_name: mini-winstall-engine
            release_name: mini-winstall-engine-linux-amd64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup System Prerequisites (Linux only)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build Project Cargo Artifacts
        working-directory: .
        run: |
          cargo build --release --target ${{ matrix.platform.target }}
        shell: bash

      - name: Stage Artifact for Packaging
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin_name }} dist/${{ matrix.platform.release_name }}
          else
            cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.bin_name }} dist/${{ matrix.platform.release_name }}
            chmod +x dist/${{ matrix.platform.release_name }}
          fi
        shell: bash

      - name: Create or Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
